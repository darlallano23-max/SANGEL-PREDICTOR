<div class="card shadow-sm mb-4">
    <div class="card-header bg-dark text-white d-flex align-items-center">
        <h5 class="margin-0" style="margin: 0; font-size: 1.1rem;">
            📊 Calculadora COMEX & Viabilidad Global
        </h5>
    </div>
    <div class="card-body">
        <p class="text-muted" style="font-size: 0.85rem;">
            Configura las variables de tu importación. El mapa se repintará automáticamente indicándote qué mercados te convienen financieramente según sus costos y riesgos logísticos.
        </p>
        
        <form id="form-calculadora-comex" oninput="if(typeof calcularYRepintarMapa === 'function') calcularYRepintarMapa()">
            <div class="row g-3">
                <div class="col-md-4 col-sm-6">
                    <label for="input-cantidad" class="form-label font-weight-bold" style="font-size: 0.85rem; font-weight: 600;">
                        📦 Cantidad Total:
                    </label>
                    <input type="number" class="form-control form-control-sm" id="input-cantidad" placeholder="Ej. 1000" min="1" value="1000">
                </div>

                <div class="col-md-4 col-sm-6">
                    <label for="input-precio" class="form-label" style="font-size: 0.85rem; font-weight: 600;">
                        💰 Precio Unitario (EXW):
                    </label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text">$</span>
                        <input type="number" class="form-control" id="input-precio" placeholder="Ej. 5.50" step="0.01" min="0.01" value="5.00">
                    </div>
                </div>

                <div class="col-md-4 col-sm-12">
                    <label for="input-arancel" class="form-label" style="font-size: 0.85rem; font-weight: 600;">
                        📈 Arancel Estimado:
                    </label>
                    <div class="input-group input-group-sm">
                        <input type="number" class="form-control" id="input-arancel" placeholder="Ej. 15" min="0" max="100" value="10">
                        <span class="input-group-text">%</span>
                    </div>
                </div>
            </div>
            
            <div class="mt-3 d-flex justify-content-end">
                <button type="button" class="btn btn-sm btn-primary" onclick="if(typeof calcularYRepintarMapa === 'function') calcularYRepintarMapa()">
                    🔮 Simular Viabilidad en Mapa
                </button>
            </div>
        </form>
    </div>
</div>
