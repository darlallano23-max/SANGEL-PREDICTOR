<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANGEL PREDICTOR - Inteligencia Logística</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="d-flex" id="wrapper">
        <div class="bg-dark text-white" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4 border-bottom fw-bold text-uppercase">
                SANGEL PREDICTOR
            </div>
            <div class="list-group list-group-flush my-3">
                <button onclick="cambiarModulo('modulo-macro')" class="list-group-item list-group-item-action bg-transparent text-white" id="btn-macro">Módulo Macroeconómico</button>
                <button onclick="cambiarModulo('modulo-calculadora')" class="list-group-item list-group-item-action bg-transparent text-white" id="btn-calc">Calculadora Comex (Excel)</button>
                <button onclick="cambiarModulo('modulo-simulador')" class="list-group-item list-group-item-action bg-transparent text-white" id="btn-sim">Simulador "What-If"</button>
                <button onclick="cambiarModulo('modulo-mapa')" class="list-group-item list-group-item-action bg-transparent text-white active" id="btn-mapa">Mapa de Calor Global</button>
                <button onclick="cambiarModulo('modulo-riesgos')" class="list-group-item list-group-item-action bg-transparent text-white" id="btn-riesgos">Riesgos Críticos</button>
                <button onclick="cambiarModulo('modulo-reporte')" class="list-group-item list-group-item-action bg-transparent text-white" id="btn-rep">Reporting & Export</button>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-light bg-light py-3 px-4 border-bottom">
                <h3 class="fs-3 m-0">Mapa de Calor Global de Riesgo</h3>
            </nav>

            <div class="container-fluid px-4 py-4">
                <div id="modulo-mapa" class="modulo-seccion">
                    <div class="card p-3 shadow-sm">
                        <h5 class="card-title mb-3">Geovisor de Riesgo en la Cadena de Suministro</h5>
                        <div id="map" style="height: 550px; width: 100%; border-radius: 8px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="js/app.js"></script>
    <script src="js/mapa.js"></script>
    <script src="js/calculadora.js"></script>
    <script src="js/predictor.js"></script>
</body>
</html>
